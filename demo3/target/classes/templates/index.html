<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot GET and POST</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .success-box { background-color: #d4edda; color: #155724; padding: 15px; margin-bottom: 20px; border-radius: 5px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { padding: 8px; width: 250px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;}
    </style>
</head>
<body>

<h2>User Registration</h2>

<!-- This block only shows if 'success' is true (i.e., after a POST request) -->
<div th:if="${success}" class="success-box">
    <p><strong>Success!</strong> Here is the data you submitted:</p>
    <p>Name: <span th:text="${user.name}"></span></p>
    <p>Email: <span th:text="${user.email}"></span></p>
</div>

<!-- The form sends a POST request to "/" and binds inputs to the User object -->
<form action="#" th:action="@{/}" th:object="${user}" method="post">

    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required />
    </div>

    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required />
    </div>

    <button type="submit">Submit</button>

</form>

</body>
</html>
